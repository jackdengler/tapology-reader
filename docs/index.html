<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TapForum">
  <meta name="theme-color" content="#e94560">
  <title>Tapology Forum Reader</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="app-header">
    <button id="back-btn" class="header-btn" hidden aria-label="Back">&larr;</button>
    <h1 id="header-title">Tapology Forums</h1>
    <button id="refresh-btn" class="header-btn" aria-label="Refresh">&#8635;</button>
  </header>

  <div id="thread-list-view" class="view">
    <div class="search-bar">
      <input type="search" id="search-input" placeholder="Search threads..." autocomplete="off">
    </div>
    <div class="sort-bar">
      <button class="sort-btn active" data-sort="latest">Latest</button>
      <button class="sort-btn" data-sort="replies">Most Replies</button>
    </div>
    <div id="thread-list" class="thread-list"></div>
    <div id="list-status" class="status-msg"></div>
  </div>

  <div id="thread-detail-view" class="view" hidden>
    <div id="thread-header" class="thread-header"></div>
    <div id="post-list" class="post-list"></div>
    <div id="detail-status" class="status-msg"></div>
  </div>

  <footer id="app-footer">
    <span id="last-updated"></span>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/thread-list.js"></script>
  <script src="js/thread-detail.js"></script>
</body>
</html>
